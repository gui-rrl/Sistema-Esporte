<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Sistema Esporte</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--gradient-primary);display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:var(--shadow-glow)">⚽</div>
      <h1 style="margin-top:.6rem">Sistema Esporte</h1>
      <p class="texto-muted-2" style="margin-top:.25rem">Acesse sua conta para continuar</p>
    </div>

    <div id="alerta" class="alerta alerta-erro oculto"></div>

    <form onsubmit="login(event)">
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input type="text" id="usuario" class="input" placeholder="Nome de usuário" required autocomplete="username">
      </div>
      <div class="form-group">
        <div class="flex justify-between" style="margin-bottom:.4rem">
          <label class="form-label" style="margin-bottom:0">Senha</label>
          <a href="/esqueci-senha.html" style="font-size:.82rem;color:var(--text-3)">Esqueceu a senha?</a>
        </div>
        <input type="password" id="senha" class="input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" id="btnLogin" class="btn btn-primario w-100" style="margin-top:.25rem">Entrar</button>
    </form>

    <div style="margin-top:1.25rem;text-align:center;padding-top:1.25rem;border-top:1px solid var(--border)">
      <span class="texto-muted-2">Não tem conta?</span>
      <a href="/registrar.html" style="margin-left:.4rem;font-weight:600">Criar conta</a>
    </div>
  </div>
</div>

<script src="/auth.js"></script>
<script>
if (isLogado()) window.location.href = '/index.html';

async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btnLogin');
  btn.disabled = true;
  btn.textContent = 'Entrando…';

  const resp = await fetch('/api/autenticacao/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nomeUsuario: document.getElementById('usuario').value,
      senha:       document.getElementById('senha').value,
    }),
  });

  const data = await resp.json();
  if (resp.ok) {
    salvarSessao(data);
    window.location.href = '/index.html';
  } else {
    const el = document.getElementById('alerta');
    el.textContent = data.erro || 'Usuário ou senha inválidos.';
    el.classList.remove('oculto');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}
</script>
</body>
</html>
