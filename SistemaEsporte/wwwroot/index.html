<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Esporte — Ranking</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="app-navbar" id="navbar"></nav>

<main class="container page">

  <!-- Stats -->
  <div class="stats-grid" id="statsGerais"></div>

  <!-- Header da tabela -->
  <div class="flex justify-between items-center mb-2" style="flex-wrap:wrap;gap:.75rem">
    <h1 class="page-title">
      <span class="icon-badge">🏅</span>
      Ranking Geral
    </h1>
    <div class="flex gap-1 items-center">
      <div style="position:relative">
        <span style="position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none">🔍</span>
        <input type="search" id="busca" class="input" style="width:260px;padding-left:2.2rem" placeholder="Buscar time...">
      </div>
      <button id="btnNovoTime" class="btn btn-primario oculto">+ Novo time</button>
    </div>
  </div>

  <div class="card-app">
    <div class="tabela-wrap">
      <table class="table-app" id="tabelaRanking">
        <thead>
          <tr>
            <th class="col-num" style="width:52px">#</th>
            <th>Time</th>
            <th class="col-num">Pts</th>
            <th class="col-num">PJ</th>
            <th class="col-num">V</th>
            <th class="col-num">E</th>
            <th class="col-num">D</th>
            <th class="col-num">GM</th>
            <th class="col-num">GS</th>
            <th class="col-num">SG</th>
            <th class="col-num">%</th>
          </tr>
        </thead>
        <tbody id="corpoRanking">
          <tr><td colspan="11" style="text-align:center;color:var(--text-3);padding:2.5rem">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal novo time -->
<div class="modal-overlay oculto" id="modalNovoTime">
  <div class="modal">
    <div class="modal-titulo">Novo Time</div>
    <div id="erroNovoTime" class="alerta alerta-erro oculto"></div>
    <div class="form-group">
      <label class="form-label">Nome do time</label>
      <input type="text" id="inputNomeTime" class="input" placeholder="Ex: Flamengo">
    </div>
    <div class="modal-acoes">
      <button onclick="fecharModal()" class="btn btn-secundario">Cancelar</button>
      <button onclick="criarTime()" class="btn btn-primario">Criar</button>
    </div>
  </div>
</div>

<script src="/auth.js"></script>
<script>
renderNavbar(document.getElementById('navbar'));

async function carregarDados() {
  const [rPainel, rTimes] = await Promise.all([
    apiFetch('/api/painel'),
    apiFetch('/api/times'),
  ]);

  if (rPainel?.ok) {
    const d = await rPainel.json();
    document.getElementById('statsGerais').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div><div class="stat-label">Times</div><div class="stat-value">${d.totalTimes}</div></div>
      </div>
      <div class="stat-card warm">
        <div class="stat-icon">⚽</div>
        <div><div class="stat-label">Partidas</div><div class="stat-value">${d.totalPartidas}</div></div>
      </div>
      <div class="stat-card cool">
        <div class="stat-icon">🏆</div>
        <div><div class="stat-label">Torneios</div><div class="stat-value">${d.totalTorneios}</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div><div class="stat-label">Em andamento</div><div class="stat-value">${d.torneiosAtivos}</div></div>
      </div>`;
  }

  if (rTimes?.ok) {
    window._times = await rTimes.json();
    renderizarRanking(window._times);
  }

  if (isAdmin()) document.getElementById('btnNovoTime').classList.remove('oculto');
}

function badgePos(pos) {
  const cls = pos === 1 ? 'rank-1' : pos === 2 ? 'rank-2' : pos === 3 ? 'rank-3' : '';
  return `<span class="rank-badge ${cls}">${pos}</span>`;
}

function renderizarRanking(times) {
  const corpo = document.getElementById('corpoRanking');
  if (!times.length) {
    corpo.innerHTML = `<tr><td colspan="11">
      <div class="empty-state">
        <div class="icon">⚽</div>
        <div class="title">Nenhum time cadastrado</div>
        <div>Crie o primeiro time para começar</div>
      </div></td></tr>`;
    return;
  }
  corpo.innerHTML = times.map(t => `
    <tr>
      <td class="col-num">${badgePos(t.posicao)}</td>
      <td>
        <div class="time-nome">
          <img class="escudo" src="${t.escudoUrl || '/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
          <a href="/time.html?id=${t.id}">${t.nome}</a>
        </div>
      </td>
      <td class="col-num"><span class="score-pill">${t.pontuacao}</span></td>
      <td class="col-num">${t.partidas}</td>
      <td class="col-num" style="color:var(--success);font-weight:600">${t.totalVitorias}</td>
      <td class="col-num" style="color:var(--warning)">${t.totalEmpates}</td>
      <td class="col-num" style="color:var(--danger)">${t.totalDerrotas}</td>
      <td class="col-num">${t.totalGolsMarcados}</td>
      <td class="col-num">${t.totalGolsSofridos}</td>
      <td class="col-num">${t.saldoGols >= 0 ? '+' + t.saldoGols : t.saldoGols}</td>
      <td class="col-num" style="color:var(--text-2)">${t.aproveitamento}%</td>
    </tr>`).join('');
}

document.getElementById('busca').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderizarRanking((window._times || []).filter(t => t.nome.toLowerCase().includes(q)));
});

document.getElementById('btnNovoTime').addEventListener('click', () => {
  document.getElementById('inputNomeTime').value = '';
  document.getElementById('erroNovoTime').classList.add('oculto');
  document.getElementById('modalNovoTime').classList.remove('oculto');
});

function fecharModal() { document.getElementById('modalNovoTime').classList.add('oculto'); }

async function criarTime() {
  const nome = document.getElementById('inputNomeTime').value.trim();
  if (!nome) return;
  const resp = await apiFetch('/api/times', { method: 'POST', body: JSON.stringify({ nome }) });
  if (resp?.ok) { fecharModal(); carregarDados(); }
  else {
    const d = await resp?.json();
    const el = document.getElementById('erroNovoTime');
    el.textContent = d?.erro || 'Erro ao criar time.';
    el.classList.remove('oculto');
  }
}

carregarDados();
</script>
</body>
</html>
