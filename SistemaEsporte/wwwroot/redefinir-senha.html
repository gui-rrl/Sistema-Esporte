<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha — Sistema Esporte</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🔒</div>
      <h1>Sistema Esporte</h1>
      <p class="texto-muted" style="margin-top:.3rem">Nova senha</p>
    </div>
    <div id="alerta" class="alerta oculto"></div>
    <form id="form" onsubmit="redefinir(event)">
      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <input type="password" id="novaSenha" class="input" placeholder="Mínimo 4 caracteres" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar nova senha</label>
        <input type="password" id="confirmarSenha" class="input" placeholder="Repita a senha" required>
      </div>
      <button type="submit" class="btn btn-primario w-100">Redefinir senha</button>
    </form>
    <p class="centralizado texto-muted mt-2"><a href="/login.html">Voltar ao login</a></p>
  </div>
</div>
<script src="/auth.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('alerta').className = 'alerta alerta-erro';
  document.getElementById('alerta').textContent = 'Link inválido.';
  document.getElementById('alerta').classList.remove('oculto');
  document.getElementById('form').style.display = 'none';
}

async function redefinir(e) {
  e.preventDefault();
  const btn = e.submitter; btn.disabled = true; btn.textContent = 'Salvando…';
  const resp = await fetch('/api/autenticacao/redefinir-senha', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      token, novaSenha: document.getElementById('novaSenha').value,
      confirmarSenha: document.getElementById('confirmarSenha').value,
    }),
  });
  const data = await resp.json();
  const el = document.getElementById('alerta');
  if (resp.ok) {
    el.className = 'alerta alerta-ok'; el.textContent = data.mensagem;
    document.getElementById('form').style.display = 'none';
  } else {
    el.className = 'alerta alerta-erro'; el.textContent = data.erro;
    btn.disabled = false; btn.textContent = 'Redefinir senha';
  }
  el.classList.remove('oculto');
}
</script>
</body>
</html>
