<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha — Sistema Esporte</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--gradient-primary);display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:var(--shadow-glow)">🔒</div>
      <h1 style="margin-top:.6rem">Nova senha</h1>
      <p class="texto-muted-2" style="margin-top:.25rem">Escolha uma nova senha para sua conta</p>
    </div>

    <div id="alerta" class="alerta oculto"></div>

    <form id="form" onsubmit="redefinir(event)">
      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <input type="password" id="novaSenha" class="input" placeholder="Mínimo 4 caracteres" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar nova senha</label>
        <input type="password" id="confirmarSenha" class="input" placeholder="Repita a senha" required>
      </div>
      <button type="submit" id="btnSalvar" class="btn btn-primario w-100">Redefinir senha</button>
    </form>

    <div style="margin-top:1.25rem;text-align:center;padding-top:1.25rem;border-top:1px solid var(--border)">
      <a href="/login.html" style="color:var(--text-3);font-size:.88rem">← Voltar ao login</a>
    </div>
  </div>
</div>

<script src="/auth.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');

if (!token) {
  const el = document.getElementById('alerta');
  el.className = 'alerta alerta-erro';
  el.textContent = 'Link inválido ou expirado. Solicite um novo.';
  el.classList.remove('oculto');
  document.getElementById('form').style.display = 'none';
}

async function redefinir(e) {
  e.preventDefault();
  const btn = document.getElementById('btnSalvar');
  btn.disabled = true;
  btn.textContent = 'Salvando…';

  const resp = await fetch('/api/autenticacao/redefinir-senha', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      token,
      novaSenha:      document.getElementById('novaSenha').value,
      confirmarSenha: document.getElementById('confirmarSenha').value,
    }),
  });

  const data = await resp.json();
  const el   = document.getElementById('alerta');

  if (resp.ok) {
    el.className = 'alerta alerta-ok';
    el.innerHTML = `✅ ${data.mensagem} <a href="/login.html" style="color:var(--accent-2);font-weight:600">Ir para o login</a>`;
    el.classList.remove('oculto');
    document.getElementById('form').style.display = 'none';
  } else {
    el.className = 'alerta alerta-erro';
    el.textContent = data.erro || 'Erro ao redefinir senha.';
    el.classList.remove('oculto');
    btn.disabled = false;
    btn.textContent = 'Redefinir senha';
  }
}
</script>
</body>
</html>
