<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar E-mail — Sistema Esporte</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box" style="text-align:center">
    <div id="iconArea" style="width:64px;height:64px;border-radius:18px;background:var(--gradient-primary);display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:var(--shadow-glow);margin-bottom:1rem">⏳</div>
    <h1 style="font-size:1.3rem;margin-bottom:.5rem">Confirmando e-mail…</h1>

    <div id="alerta" class="alerta oculto" style="text-align:left"></div>

    <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)">
      <a href="/login.html" style="color:var(--text-3);font-size:.88rem">← Ir para o login</a>
    </div>
  </div>
</div>

<script src="/auth.js"></script>
<script>
(async () => {
  const token = new URLSearchParams(location.search).get('token');
  const el    = document.getElementById('alerta');
  const icon  = document.getElementById('iconArea');

  if (!token) {
    icon.textContent = '❌';
    icon.style.background = 'linear-gradient(135deg,#ef4444,#f87171)';
    el.className = 'alerta alerta-erro';
    el.textContent = 'Token inválido. Verifique o link enviado por e-mail.';
    el.classList.remove('oculto');
    return;
  }

  const resp = await fetch(`/api/autenticacao/confirmar-email?token=${encodeURIComponent(token)}`);
  const data = await resp.json();

  if (resp.ok) {
    icon.textContent = '✅';
    el.className = 'alerta alerta-ok';
    el.innerHTML = `${data.mensagem} <a href="/login.html" style="color:var(--accent-2);font-weight:600;margin-left:.35rem">Fazer login →</a>`;
  } else {
    icon.textContent = '❌';
    icon.style.background = 'linear-gradient(135deg,#ef4444,#f87171)';
    el.className = 'alerta alerta-erro';
    el.textContent = data.erro || 'Não foi possível confirmar o e-mail.';
  }

  el.classList.remove('oculto');
  document.querySelector('h1').style.display = 'none';
})();
</script>
</body>
</html>
