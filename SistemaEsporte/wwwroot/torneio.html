<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneio — Sistema Esporte</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<main class="container pagina">
  <div id="conteudo"><p class="texto-muted">Carregando...</p></div>
</main>

<!-- Modal resultado -->
<div class="modal-overlay oculto" id="modalResultado">
  <div class="modal">
    <div class="modal-titulo" id="tituloModalRes">Registrar Resultado</div>
    <div id="erroRes" class="alerta alerta-erro oculto"></div>
    <input type="hidden" id="resPartidaId">
    <div class="flex gap-1 items-center mb-2">
      <div class="form-group" style="flex:1;margin-bottom:0">
        <label class="form-label" id="labelT1">Time 1</label>
        <input type="number" id="resGolsT1" class="input" value="0" min="0">
      </div>
      <span style="align-self:flex-end;padding-bottom:.55rem;color:var(--texto-sec)">×</span>
      <div class="form-group" style="flex:1;margin-bottom:0">
        <label class="form-label" id="labelT2">Time 2</label>
        <input type="number" id="resGolsT2" class="input" value="0" min="0">
      </div>
    </div>
    <div id="campoVolta" class="oculto">
      <p class="texto-muted mb-1" style="font-size:.85rem">Jogo da volta:</p>
      <div class="flex gap-1 items-center mb-2">
        <div class="form-group" style="flex:1;margin-bottom:0">
          <input type="number" id="resGolsT1V" class="input" value="0" min="0">
        </div>
        <span style="align-self:flex-end;padding-bottom:.55rem;color:var(--texto-sec)">×</span>
        <div class="form-group" style="flex:1;margin-bottom:0">
          <input type="number" id="resGolsT2V" class="input" value="0" min="0">
        </div>
      </div>
    </div>
    <div class="modal-acoes">
      <button onclick="fecharModalRes()" class="btn btn-secundario">Cancelar</button>
      <button onclick="salvarResultado()" class="btn btn-primario">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal add time -->
<div class="modal-overlay oculto" id="modalAddTime">
  <div class="modal">
    <div class="modal-titulo">Inscrever Time</div>
    <div id="erroAddTime" class="alerta alerta-erro oculto"></div>
    <div class="form-group">
      <label class="form-label">Selecione o time</label>
      <select id="selAddTime" class="select"></select>
    </div>
    <div class="modal-acoes">
      <button onclick="fecharModalAdd()" class="btn btn-secundario">Cancelar</button>
      <button onclick="addTime()" class="btn btn-primario">Inscrever</button>
    </div>
  </div>
</div>

<script src="/auth.js"></script>
<script>
renderNavbar(document.getElementById('navbar'));
const id = new URLSearchParams(location.search).get('id');
if (!id) location.href = '/torneios.html';

let torneioAtual = null;
const FORMATOS = ['Pontos Corridos','Copa','Mata-Mata Simples','Mata-Mata Ida e Volta'];
const STATUS   = { 0:'Preparação', 1:'Em Andamento', 2:'Finalizado' };
const FASES    = { 'Final':'Final', 'Semifinal':'Semifinal', 'QuartasDeFinall':'Quartas de Final',
                   'OitavasDeFinall':'Oitavas de Final', 'Terceiro':'3º Lugar', 'RodadaLiga':'Liga' };

async function carregar() {
  const resp = await apiFetch(`/api/torneios/${id}`);
  if (!resp?.ok) { document.getElementById('conteudo').innerHTML = '<p class="texto-muted">Torneio não encontrado.</p>'; return; }
  torneioAtual = await resp.json();
  renderizar();
}

function nomeTime(tt) { return tt?.nome || tt?.nomeExibicao || 'A definir'; }

function renderizar() {
  const t = torneioAtual;
  const admin = isAdmin();
  const podeGerar = admin && t.status === 0 && t.times.length >= 2;
  const podeMM    = admin && t.formato === 1 && t.status === 1 && t.partidas.every(p => p.fase.startsWith('Grupo') ? p.concluida : true);

  let html = `
    <div class="flex justify-between items-center mb-2" style="flex-wrap:wrap;gap:.75rem">
      <div>
        <a href="/torneios.html" class="texto-muted" style="font-size:.85rem">← Torneios</a>
        <h1 class="pagina-titulo" style="margin:.3rem 0 .1rem">${t.nome}</h1>
        <span class="badge badge-${t.status===0?'amarelo':t.status===1?'verde':'cinza'}">${STATUS[t.status]}</span>
        <span class="texto-muted" style="margin-left:.5rem;font-size:.85rem">${FORMATOS[t.formato]}</span>
      </div>
      <div class="flex gap-1" style="flex-wrap:wrap">
        ${podeGerar ? `<button onclick="gerarTorneio()" class="btn btn-primario">⚡ Gerar torneio</button>` : ''}
        ${podeMM ? `<button onclick="gerarMataMata()" class="btn btn-primario">⚡ Gerar mata-mata</button>` : ''}
        ${admin && t.status === 0 ? `<button onclick="abrirAddTime()" class="btn btn-secundario">+ Inscrever time</button>` : ''}
      </div>
    </div>
    <div id="alertaTorneio" class="alerta oculto"></div>`;

  // Times / Classificação
  if (t.formato === 0 || (t.formato === 1 && t.status > 0)) {
    html += renderTabelaTimes(t.times, t.formato === 1);
  } else if (t.status === 0) {
    html += renderTimesInscritos(t.times);
  }

  // Partidas
  if (t.partidas.length > 0) {
    if (t.formato === 0) html += renderRodadas(t);
    else if (t.formato === 1) html += renderGrupos(t) + renderChaveamento(t);
    else html += renderChaveamento(t);
  }

  document.getElementById('conteudo').innerHTML = html;
}

function renderTimesInscritos(times) {
  if (!times.length) return `<div class="card mb-2"><p class="texto-muted centralizado">Nenhum time inscrito ainda.</p></div>`;
  return `<div class="card mb-2">
    <div class="card-titulo">Times inscritos (${times.length})</div>
    <div style="display:flex;flex-wrap:wrap;gap:.5rem">
      ${times.map(tt => `<div class="flex items-center gap-1" style="background:var(--verde-bg);border:1px solid var(--verde-borda);border-radius:8px;padding:.35rem .7rem">
        <img class="escudo" style="width:24px;height:24px" src="${tt.escudoUrl||'/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
        <span style="font-size:.88rem">${tt.nome}</span>
        ${isAdmin() && torneioAtual.status===0 ? `<button onclick="removerTimeInscrito(${tt.id})" style="background:none;border:none;color:var(--perigo);cursor:pointer;padding:0 0 0 .3rem">×</button>` : ''}
      </div>`).join('')}
    </div>
  </div>`;
}

function renderTabelaTimes(times, comGrupo) {
  const cols = comGrupo ? '' : '';
  return `<div class="card mb-2">
    <div class="card-titulo">Classificação</div>
    <div class="tabela-wrap"><table>
      <thead><tr>
        <th class="col-num">#</th>
        ${comGrupo ? '<th>Grupo</th>' : ''}
        <th>Time</th>
        <th class="col-num">Pts</th><th class="col-num">PJ</th>
        <th class="col-num">V</th><th class="col-num">E</th><th class="col-num">D</th>
        <th class="col-num">GM</th><th class="col-num">GS</th><th class="col-num">SG</th>
      </tr></thead>
      <tbody>${times.map(tt => `<tr>
        <td class="col-num">${tt.posicao}</td>
        ${comGrupo ? `<td><span class="badge badge-cinza">Grupo ${tt.grupo||'?'}</span></td>` : ''}
        <td><div class="time-nome">
          <img class="escudo" src="${tt.escudoUrl||'/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
          <a href="/time.html?id=${tt.timeId}">${tt.nome}</a>
        </div></td>
        <td class="col-num"><strong style="color:var(--verde-claro)">${tt.pontos}</strong></td>
        <td class="col-num">${tt.partidasJogadas}</td>
        <td class="col-num">${tt.vitorias}</td><td class="col-num">${tt.empates}</td><td class="col-num">${tt.derrotas}</td>
        <td class="col-num">${tt.golsMarcados}</td><td class="col-num">${tt.golsSofridos}</td>
        <td class="col-num">${tt.saldoGols>=0?'+'+tt.saldoGols:tt.saldoGols}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function renderRodadas(t) {
  const porRodada = {};
  t.partidas.forEach(p => { (porRodada[p.rodada] = porRodada[p.rodada]||[]).push(p); });
  return Object.entries(porRodada).map(([r, ps]) => `
    <div class="card mb-2">
      <div class="card-titulo">Rodada ${r}</div>
      ${ps.map(p => renderLinhaPartida(p, t)).join('')}
    </div>`).join('');
}

function renderGrupos(t) {
  const grupos = {};
  t.partidas.filter(p => p.fase.startsWith('Grupo')).forEach(p => { (grupos[p.fase]=grupos[p.fase]||[]).push(p); });
  if (!Object.keys(grupos).length) return '';
  return `<div class="card mb-2">
    <div class="card-titulo">Fase de Grupos</div>
    <div class="grupos-grid">${Object.entries(grupos).map(([fase, ps]) => `
      <div>
        <div style="font-size:.85rem;font-weight:600;color:var(--texto-sec);margin-bottom:.5rem">Grupo ${fase.replace('Grupo','')}</div>
        ${ps.map(p => renderLinhaPartida(p, t)).join('')}
      </div>`).join('')}
    </div>
  </div>`;
}

function renderChaveamento(t) {
  const fases = ['OitavasDeFinall','QuartasDeFinall','Semifinal','Terceiro','Final'];
  const partidasPorFase = {};
  t.partidas.filter(p => fases.includes(p.fase) || (!p.fase.startsWith('Grupo') && p.fase !== 'RodadaLiga'))
    .forEach(p => { (partidasPorFase[p.fase]=partidasPorFase[p.fase]||[]).push(p); });
  if (!Object.keys(partidasPorFase).length) return '';
  const ordem = fases.filter(f => partidasPorFase[f]);
  return `<div class="card mb-2">
    <div class="card-titulo">Chaveamento</div>
    <div class="chaveamento">
      ${ordem.map(fase => `
        <div class="rodada">
          <div class="rodada-titulo">${FASES[fase]||fase}</div>
          ${(partidasPorFase[fase]||[]).map(p => renderPartidaChave(p, t)).join('')}
        </div>`).join('')}
    </div>
  </div>`;
}

function nomeDoTime(tt, times) {
  if (!tt) return null;
  const found = times.find(x => x.id === tt);
  return found ? found.nome : 'A definir';
}

function renderLinhaPartida(p, t) {
  const t1 = nomeDoTime(p.time1Id, t.times);
  const t2 = nomeDoTime(p.time2Id, t.times);
  const v  = p.concluida ? (p.vencedorId === p.time1Id ? 'v1' : p.vencedorId === p.time2Id ? 'v2' : 'e') : '';
  const btn = isAdmin() && !p.concluida && !p.ehBye && p.time1Id && p.time2Id
    ? `<button onclick="abrirRes(${p.id},'${t1||''}','${t2||''}')" class="btn btn-secundario btn-sm">+ Resultado</button>` : '';
  return `<div class="flex items-center gap-1 mb-1" style="background:var(--verde-bg);border:1px solid var(--verde-borda);border-radius:8px;padding:.4rem .75rem">
    <span style="${v==='v1'?'color:var(--verde-claro);font-weight:600':'color:var(--texto-primario)'}">${t1||'A definir'}</span>
    <span style="margin:0 .4rem;color:var(--texto-sec)">${p.concluida?`<strong>${p.golsTime1} × ${p.golsTime2}</strong>`:'vs'}</span>
    <span style="${v==='v2'?'color:var(--verde-claro);font-weight:600':'color:var(--texto-primario)'}">${t2||'A definir'}</span>
    ${btn ? `<span style="margin-left:auto">${btn}</span>` : ''}
  </div>`;
}

function renderPartidaChave(p, t) {
  const t1nome = nomeDoTime(p.time1Id, t.times);
  const t2nome = nomeDoTime(p.time2Id, t.times);
  if (p.ehBye) return `<div class="partida-chave">
    <div class="slot-time vencedor"><span>${t1nome||'BYE'}</span><span class="slot-gols">BYE</span></div>
    <div class="slot-time bye"><span>—</span></div>
  </div>`;
  const v1 = p.concluida && p.vencedorId === p.time1Id;
  const v2 = p.concluida && p.vencedorId === p.time2Id;
  const btn = isAdmin() && !p.concluida && p.time1Id && p.time2Id
    ? `<div style="padding:.3rem .65rem"><button onclick="abrirRes(${p.id},'${t1nome||''}','${t2nome||''}')" class="btn btn-secundario btn-sm w-100">+ Resultado</button></div>` : '';
  return `<div class="partida-chave">
    <div class="slot-time ${v1?'vencedor':''}">
      <span>${t1nome||'A definir'}</span>
      ${p.concluida?`<span class="slot-gols">${p.golsTime1}</span>`:''}
    </div>
    <div class="slot-time ${v2?'vencedor':''}">
      <span>${t2nome||'A definir'}</span>
      ${p.concluida?`<span class="slot-gols">${p.golsTime2}</span>`:''}
    </div>
    ${btn}
  </div>`;
}

// Actions
async function gerarTorneio() {
  if (!confirm('Gerar o torneio? Isso sorteará os confrontos.')) return;
  const resp = await apiFetch(`/api/torneios/${id}/gerar`, { method: 'POST' });
  if (resp?.ok) carregar();
  else { const d = await resp?.json(); alert(d?.erro || 'Erro ao gerar.'); }
}

async function gerarMataMata() {
  if (!confirm('Gerar a fase mata-mata com os classificados?')) return;
  const resp = await apiFetch(`/api/torneios/${id}/gerar-mata-mata`, { method: 'POST' });
  if (resp?.ok) carregar();
  else { const d = await resp?.json(); alert(d?.erro || 'Erro.'); }
}

// Resultado
function abrirRes(partidaId, nomeT1, nomeT2) {
  document.getElementById('resPartidaId').value = partidaId;
  document.getElementById('labelT1').textContent = nomeT1 || 'Time 1';
  document.getElementById('labelT2').textContent = nomeT2 || 'Time 2';
  document.getElementById('resGolsT1').value = 0;
  document.getElementById('resGolsT2').value = 0;
  document.getElementById('resGolsT1V').value = 0;
  document.getElementById('resGolsT2V').value = 0;
  document.getElementById('campoVolta').classList.toggle('oculto', torneioAtual.formato !== 3);
  document.getElementById('erroRes').classList.add('oculto');
  document.getElementById('modalResultado').classList.remove('oculto');
}
function fecharModalRes() { document.getElementById('modalResultado').classList.add('oculto'); }

async function salvarResultado() {
  const pid = document.getElementById('resPartidaId').value;
  const idaVolta = torneioAtual.formato === 3;
  const body = {
    golsTime1: parseInt(document.getElementById('resGolsT1').value),
    golsTime2: parseInt(document.getElementById('resGolsT2').value),
    golsTime1Volta: idaVolta ? parseInt(document.getElementById('resGolsT1V').value) : null,
    golsTime2Volta: idaVolta ? parseInt(document.getElementById('resGolsT2V').value) : null,
  };
  const resp = await apiFetch(`/api/torneios/${id}/partidas/${pid}`, { method: 'PUT', body: JSON.stringify(body) });
  if (resp?.ok) { fecharModalRes(); carregar(); }
  else {
    const d = await resp?.json();
    const el = document.getElementById('erroRes');
    el.textContent = d?.erro || 'Erro ao salvar resultado.';
    el.classList.remove('oculto');
  }
}

// Add time
async function abrirAddTime() {
  const resp = await apiFetch('/api/times');
  if (!resp?.ok) return;
  const todos = await resp.json();
  const inscritos = new Set(torneioAtual.times.map(tt => tt.timeId));
  const disponiveis = todos.filter(t => !inscritos.has(t.id));
  if (!disponiveis.length) { alert('Todos os times já estão inscritos.'); return; }
  document.getElementById('selAddTime').innerHTML = disponiveis.map(t => `<option value="${t.id}">${t.nome}</option>`).join('');
  document.getElementById('erroAddTime').classList.add('oculto');
  document.getElementById('modalAddTime').classList.remove('oculto');
}
function fecharModalAdd() { document.getElementById('modalAddTime').classList.add('oculto'); }

async function addTime() {
  const timeId = parseInt(document.getElementById('selAddTime').value);
  const resp = await apiFetch(`/api/torneios/${id}/times`, { method: 'POST', body: JSON.stringify({ timeId }) });
  if (resp?.ok) { fecharModalAdd(); carregar(); }
  else {
    const d = await resp?.json();
    const el = document.getElementById('erroAddTime');
    el.textContent = d?.erro || 'Erro ao inscrever time.';
    el.classList.remove('oculto');
  }
}

async function removerTimeInscrito(ttId) {
  if (!confirm('Remover este time do torneio?')) return;
  const resp = await apiFetch(`/api/torneios/${id}/times/${ttId}`, { method: 'DELETE' });
  if (resp?.ok) carregar();
}

carregar();
</script>
</body>
</html>
