<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneio — Sistema Esporte</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="app-navbar" id="navbar"></nav>

<main class="container page">
  <div id="conteudo">
    <div class="empty-state"><div class="icon">⏳</div><div class="title">Carregando...</div></div>
  </div>
</main>

<!-- Modal resultado -->
<div class="modal-overlay oculto" id="modalResultado">
  <div class="modal">
    <div class="modal-titulo" id="tituloModalRes">Registrar Resultado</div>
    <div id="erroRes" class="alerta alerta-erro oculto"></div>
    <input type="hidden" id="resPartidaId">
    <div class="flex gap-1 items-center mb-2">
      <div class="form-group" style="flex:1;margin-bottom:0">
        <label class="form-label" id="labelT1">Time 1</label>
        <input type="number" id="resGolsT1" class="input" value="0" min="0">
      </div>
      <span style="align-self:flex-end;padding-bottom:.55rem;color:var(--text-3);font-size:1.1rem">×</span>
      <div class="form-group" style="flex:1;margin-bottom:0">
        <label class="form-label" id="labelT2">Time 2</label>
        <input type="number" id="resGolsT2" class="input" value="0" min="0">
      </div>
    </div>
    <div id="campoVolta" class="oculto">
      <p class="texto-muted-2 mb-1">Jogo da volta:</p>
      <div class="flex gap-1 items-center mb-2">
        <div class="form-group" style="flex:1;margin-bottom:0">
          <input type="number" id="resGolsT1V" class="input" value="0" min="0">
        </div>
        <span style="align-self:flex-end;padding-bottom:.55rem;color:var(--text-3)">×</span>
        <div class="form-group" style="flex:1;margin-bottom:0">
          <input type="number" id="resGolsT2V" class="input" value="0" min="0">
        </div>
      </div>
    </div>
    <div class="modal-acoes">
      <button onclick="fecharModalRes()" class="btn btn-secundario">Cancelar</button>
      <button onclick="salvarResultado()" class="btn btn-primario">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal add times (checkbox) -->
<div class="modal-overlay oculto" id="modalAddTime">
  <div class="modal" style="max-width:520px">
    <div class="modal-titulo">Inscrever Times</div>
    <div id="erroAddTime" class="alerta alerta-erro oculto"></div>
    <div class="flex justify-between items-center mb-1">
      <span class="texto-muted-2" id="contadorSel">0 selecionados</span>
      <div class="flex gap-1">
        <button onclick="selecionarTodos(true)"  class="btn btn-secundario btn-sm">Todos</button>
        <button onclick="selecionarTodos(false)" class="btn btn-secundario btn-sm">Nenhum</button>
      </div>
    </div>
    <div id="listaCheckTimes" style="max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:.5rem;display:flex;flex-direction:column;gap:.2rem"></div>
    <div class="modal-acoes">
      <button onclick="fecharModalAdd()" class="btn btn-secundario">Cancelar</button>
      <button onclick="addTimes()" class="btn btn-primario">Inscrever selecionados</button>
    </div>
  </div>
</div>

<script src="/auth.js"></script>
<script>
renderNavbar(document.getElementById('navbar'));
const id = new URLSearchParams(location.search).get('id');
if (!id) location.href = '/torneios.html';

let torneioAtual = null;
const FORMATOS = ['Pontos Corridos','Copa','Mata-Mata Simples','Mata-Mata Ida e Volta'];
const FASES    = {
  Final:'Final', Semifinal:'Semifinal',
  QuartasDeFinall:'Quartas de Final', OitavasDeFinall:'Oitavas de Final',
  Terceiro:'3º Lugar', RodadaLiga:'Liga'
};

async function carregar() {
  const resp = await apiFetch(`/api/torneios/${id}`);
  if (!resp?.ok) {
    document.getElementById('conteudo').innerHTML = '<div class="empty-state"><div class="icon">❌</div><div class="title">Torneio não encontrado</div></div>';
    return;
  }
  torneioAtual = await resp.json();
  renderizar();
}

function statusPill(s) {
  const m = { 0:['prep','Preparação'], 1:['live','Em Andamento'], 2:['done','Finalizado'] };
  const [cls, label] = m[s] ?? ['done','?'];
  return `<span class="status-pill ${cls}">${label}</span>`;
}

function renderizar() {
  const t = torneioAtual;
  const admin = isAdmin();
  const podeGerar = admin && t.status === 0 && t.times.length >= 2;
  const podeMM    = admin && t.formato === 1 && t.status === 1 &&
    t.partidas.filter(p => p.fase.startsWith('Grupo')).every(p => p.concluida);

  const FMT_ICON = ['📊','🏆','⚔️','⚔️'];

  let html = `
    <a href="/torneios.html" class="btn btn-link btn-sm" style="margin-bottom:.75rem;display:inline-flex">← Torneios</a>

    <div style="
      background: radial-gradient(900px 280px at 10% -20%, rgba(22,163,74,0.22), transparent 60%),
                  radial-gradient(600px 300px at 95% 110%, rgba(52,211,153,0.14), transparent 60%),
                  linear-gradient(180deg,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.02) 100%);
      border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:2rem 2rem 2rem;margin-bottom:1.5rem">

      <div class="flex justify-between items-start" style="flex-wrap:wrap;gap:1rem">
        <div>
          <div class="texto-muted-2" style="font-size:.8rem;margin-bottom:.35rem;letter-spacing:.06em;text-transform:uppercase">
            ${FMT_ICON[t.formato]} ${FORMATOS[t.formato]}
          </div>
          <h1 style="font-family:'Sora',sans-serif;font-size:2rem;font-weight:800;margin:0 0 .75rem;color:var(--text-1);line-height:1.15">
            ${t.nome}
          </h1>
          <div class="flex items-center gap-1" style="flex-wrap:wrap">
            ${statusPill(t.status)}
            ${t.status === 1 && t.totalRodadas ? `<span class="texto-muted-2" style="font-size:.85rem">Rodada ${t.rodadaAtual}/${t.totalRodadas}</span>` : ''}
            ${t.times?.length ? `<span class="texto-muted-2" style="font-size:.85rem">${t.times.length} time${t.times.length !== 1 ? 's' : ''}</span>` : ''}
          </div>
        </div>
        <div class="flex gap-1" style="flex-wrap:wrap;align-self:flex-start">
          ${podeGerar ? `<button onclick="gerarTorneio()" class="btn btn-primario">⚡ Gerar torneio</button>` : ''}
          ${podeMM    ? `<button onclick="gerarMataMata()" class="btn btn-primario">⚡ Gerar mata-mata</button>` : ''}
          ${admin && t.status === 0 ? `<button onclick="abrirAddTime()" class="btn btn-secundario">+ Inscrever times</button>` : ''}
        </div>
      </div>
    </div>
    <div id="alertaTorneio" class="alerta oculto"></div>`;

  // Times
  if (t.status === 0) {
    html += renderTimesInscritos(t.times);
  } else if (t.formato === 1) {
    // Copa: partidas dos grupos primeiro, tabelas por grupo abaixo
    if (t.partidas.length > 0) {
      html += renderGrupos(t);
      html += renderTabelasPorGrupo(t);
      const temMataMata = t.partidas.some(p =>
        ['OitavasDeFinall','QuartasDeFinall','Semifinal','Terceiro','Final'].includes(p.fase));
      if (temMataMata) {
        html += `<div class="card-app mb-2">
          <div class="card-body" style="text-align:center;padding:1.25rem">
            <a href="/chaveamento.html?id=${id}" class="btn btn-link" style="font-size:1rem;padding:.65rem 2rem">
              🥊 Ver Chaveamento
            </a>
          </div>
        </div>`;
      }
    }
  } else {
    html += renderTabelaTimes(t.times, t.formato === 0);
    if (t.partidas.length > 0) {
      if (t.formato === 0) html += renderRodadas(t);
      else html += renderChaveamento(t);
    }
  }

  document.getElementById('conteudo').innerHTML = html;
}

// ===== Renderização times inscritos (pills) =====
function renderTimesInscritos(times) {
  const header = `<div class="card-app mb-2">
    <div class="card-header">👥 Times inscritos <span style="color:var(--text-3);font-weight:400">(${times.length})</span></div>`;

  if (!times.length) return header + `
    <div class="card-body">
      <div class="empty-state" style="padding:1.5rem">
        <div class="icon" style="font-size:2rem">👥</div>
        <div class="title" style="font-size:.95rem">Nenhum time inscrito</div>
        <div style="font-size:.82rem">Clique em "Inscrever times" para adicionar</div>
      </div>
    </div></div>`;

  return header + `
    <div class="times-inscritos">
      ${times.map(tt => `
        <div class="time-pill">
          <img src="${tt.escudoUrl || '/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
          <span>${tt.nome}</span>
          ${isAdmin() && torneioAtual.status === 0
            ? `<button class="btn-remover" onclick="removerTimeInscrito(${tt.id})" title="Remover">✕</button>`
            : ''}
        </div>`).join('')}
    </div>
  </div>`;
}

// ===== Tabela de classificação =====
function renderTabelaTimes(times, comGrupo) {
  if (!times.length) return '';
  return `<div class="card-app mb-2">
    <div class="card-header">📊 Classificação</div>
    <div class="tabela-wrap"><table class="table-app">
      <thead><tr>
        <th class="col-num" style="width:48px">#</th>
        ${comGrupo && torneioAtual.formato === 1 ? '<th style="width:80px">Grupo</th>' : ''}
        <th>Time</th>
        <th class="col-num">Pts</th><th class="col-num">PJ</th>
        <th class="col-num">V</th><th class="col-num">E</th><th class="col-num">D</th>
        <th class="col-num">GM</th><th class="col-num">GS</th><th class="col-num">SG</th>
      </tr></thead>
      <tbody>${times.map((tt, i) => {
        const pos = i + 1;
        const badge = pos <= 3
          ? `<span class="rank-badge rank-${pos}">${pos}</span>`
          : `<span class="rank-badge">${pos}</span>`;
        return `<tr>
          <td class="col-num">${badge}</td>
          ${comGrupo && torneioAtual.formato === 1 ? `<td><span class="status-pill done" style="font-size:.7rem">${tt.grupo || '?'}</span></td>` : ''}
          <td><div class="time-nome">
            <img class="escudo" src="${tt.escudoUrl || '/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
            <a href="/time.html?id=${tt.timeId}">${tt.nome}</a>
          </div></td>
          <td class="col-num"><span class="score-pill">${tt.pontos}</span></td>
          <td class="col-num">${tt.partidasJogadas}</td>
          <td class="col-num" style="color:var(--success);font-weight:600">${tt.vitorias}</td>
          <td class="col-num" style="color:var(--warning)">${tt.empates}</td>
          <td class="col-num" style="color:var(--danger)">${tt.derrotas}</td>
          <td class="col-num">${tt.golsMarcados}</td>
          <td class="col-num">${tt.golsSofridos}</td>
          <td class="col-num">${tt.saldoGols >= 0 ? '+' + tt.saldoGols : tt.saldoGols}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

// ===== Tabelas por grupo (copa) =====
function renderTabelasPorGrupo(t) {
  const porGrupo = {};
  t.times.forEach(tt => {
    const g = tt.grupo || 'Sem Grupo';
    (porGrupo[g] = porGrupo[g] || []).push(tt);
  });
  const grupos = Object.keys(porGrupo).sort();
  if (!grupos.length) return '';

  const tabelas = grupos.map(g => {
    const times = porGrupo[g].slice().sort((a, b) =>
      b.pontos - a.pontos ||
      b.vitorias - a.vitorias ||
      b.saldoGols - a.saldoGols ||
      b.golsMarcados - a.golsMarcados
    );
    const rows = times.map((tt, i) => {
      const pos = i + 1;
      const badge = pos <= 2
        ? `<span class="rank-badge rank-${pos}">${pos}</span>`
        : `<span class="rank-badge">${pos}</span>`;
      return `<tr>
        <td class="col-num">${badge}</td>
        <td><div class="time-nome">
          <img class="escudo" src="${tt.escudoUrl || '/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
          <a href="/time.html?id=${tt.timeId}">${tt.nome}</a>
        </div></td>
        <td class="col-num"><span class="score-pill">${tt.pontos}</span></td>
        <td class="col-num">${tt.partidasJogadas}</td>
        <td class="col-num" style="color:var(--success);font-weight:600">${tt.vitorias}</td>
        <td class="col-num" style="color:var(--warning)">${tt.empates}</td>
        <td class="col-num" style="color:var(--danger)">${tt.derrotas}</td>
        <td class="col-num">${tt.saldoGols >= 0 ? '+' + tt.saldoGols : tt.saldoGols}</td>
      </tr>`;
    }).join('');

    return `<div>
      <div style="font-size:.75rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem">
        Grupo ${g.replace('Grupo','')}
      </div>
      <div class="tabela-wrap"><table class="table-app">
        <thead><tr>
          <th class="col-num" style="width:36px">#</th>
          <th>Time</th>
          <th class="col-num">Pts</th>
          <th class="col-num">PJ</th>
          <th class="col-num">V</th>
          <th class="col-num">E</th>
          <th class="col-num">D</th>
          <th class="col-num">SG</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');

  return `<div class="card-app mb-2">
    <div class="card-header">📊 Classificação por Grupo</div>
    <div class="card-body">
      <div class="grupos-grid">${tabelas}</div>
    </div>
  </div>`;
}

// ===== Rodadas (liga) =====
function renderRodadas(t) {
  const porRodada = {};
  t.partidas.forEach(p => { (porRodada[p.rodada] = porRodada[p.rodada] || []).push(p); });
  return Object.entries(porRodada).map(([r, ps]) => `
    <div class="card-app mb-2">
      <div class="card-header">🗓 Rodada ${r}</div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:.5rem">
        ${ps.map(p => renderLinhaPartida(p, t)).join('')}
      </div>
    </div>`).join('');
}

// ===== Grupos (copa) =====
function renderGrupos(t) {
  const grupos = {};
  t.partidas.filter(p => p.fase.startsWith('Grupo')).forEach(p => {
    (grupos[p.fase] = grupos[p.fase] || []).push(p);
  });
  if (!Object.keys(grupos).length) return '';
  return `<div class="card-app mb-2">
    <div class="card-header">⚽ Fase de Grupos</div>
    <div class="card-body">
      <div class="grupos-grid">
        ${Object.entries(grupos).map(([fase, ps]) => `
          <div>
            <div style="font-size:.75rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem">
              Grupo ${fase.replace('Grupo','')}
            </div>
            ${ps.map(p => renderLinhaPartida(p, t)).join('')}
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ===== Chaveamento =====
function renderChaveamento(t) {
  const ordemFases = ['OitavasDeFinall','QuartasDeFinall','Semifinal','Terceiro','Final'];
  const porFase = {};
  t.partidas.filter(p => ordemFases.includes(p.fase))
    .forEach(p => { (porFase[p.fase] = porFase[p.fase] || []).push(p); });
  const fases = ordemFases.filter(f => porFase[f]);
  if (!fases.length) return '';
  return `<div class="card-app mb-2">
    <div class="card-header">🥊 Chaveamento</div>
    <div class="card-body">
      <div class="chaveamento">
        ${fases.map(fase => `
          <div class="rodada">
            <div class="rodada-titulo">${FASES[fase] || fase}</div>
            ${(porFase[fase] || []).map(p => renderPartidaChave(p, t)).join('')}
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ===== Helpers de partida =====
function nomeDoTime(ttId, times) {
  if (!ttId) return null;
  return times.find(x => x.id === ttId)?.nome || null;
}

function renderLinhaPartida(p, t) {
  const n1 = nomeDoTime(p.time1Id, t.times) || 'A definir';
  const n2 = nomeDoTime(p.time2Id, t.times) || 'A definir';
  const v1 = p.concluida && p.vencedorId === p.time1Id;
  const v2 = p.concluida && p.vencedorId === p.time2Id;
  const placar = p.concluida
    ? `<span class="score-pill">${p.golsTime1} × ${p.golsTime2}</span>`
    : `<span class="texto-muted-2" style="font-size:.8rem">vs</span>`;
  const btn = isAdmin() && !p.concluida && !p.ehBye && p.time1Id && p.time2Id
    ? `<button onclick="abrirRes(${p.id},'${n1}','${n2}')" class="btn btn-secundario btn-sm" style="margin-left:auto">+ Resultado</button>`
    : '';
  return `<div class="partida-row">
    <img class="escudo" src="${t.times.find(x=>x.id===p.time1Id)?.escudoUrl||'/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
    <span class="nome-time" style="${v1?'color:var(--accent);font-weight:600':'color:var(--text-1)'}" title="${n1}">${n1}</span>
    ${placar}
    <span class="nome-time nome-dir" style="${v2?'color:var(--accent);font-weight:600':'color:var(--text-1)'}" title="${n2}">${n2}</span>
    <img class="escudo" src="${t.times.find(x=>x.id===p.time2Id)?.escudoUrl||'/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
    ${btn}
  </div>`;
}

function renderPartidaChave(p, t) {
  const n1 = nomeDoTime(p.time1Id, t.times);
  const n2 = nomeDoTime(p.time2Id, t.times);
  const esc1 = t.times.find(x=>x.id===p.time1Id)?.escudoUrl || '/img/escudo-default.svg';
  const esc2 = t.times.find(x=>x.id===p.time2Id)?.escudoUrl || '/img/escudo-default.svg';

  if (p.ehBye) return `<div class="partida-chave">
    <div class="slot-time vencedor">
      <img class="escudo" style="width:22px;height:22px" src="${esc1}" onerror="this.src='/img/escudo-default.svg'">
      <span>${n1 || 'BYE'}</span><span class="slot-gols">BYE</span>
    </div>
    <div class="slot-time bye"><span>—</span></div>
  </div>`;

  const v1 = p.concluida && p.vencedorId === p.time1Id;
  const v2 = p.concluida && p.vencedorId === p.time2Id;
  const btn = isAdmin() && !p.concluida && p.time1Id && p.time2Id
    ? `<div style="padding:.3rem .6rem"><button onclick="abrirRes(${p.id},'${n1||''}','${n2||''}')" class="btn btn-secundario btn-sm w-100">+ Resultado</button></div>` : '';

  return `<div class="partida-chave">
    <div class="slot-time ${v1?'vencedor':''}">
      <img class="escudo" style="width:22px;height:22px" src="${esc1}" onerror="this.src='/img/escudo-default.svg'">
      <span>${n1 || 'A definir'}</span>
      ${p.concluida ? `<span class="slot-gols">${p.golsTime1}</span>` : ''}
    </div>
    <div class="slot-time ${v2?'vencedor':''}">
      <img class="escudo" style="width:22px;height:22px" src="${esc2}" onerror="this.src='/img/escudo-default.svg'">
      <span>${n2 || 'A definir'}</span>
      ${p.concluida ? `<span class="slot-gols">${p.golsTime2}</span>` : ''}
    </div>
    ${btn}
  </div>`;
}

// ===== Ações =====
async function gerarTorneio() {
  if (!await sConfirm('Os confrontos serão sorteados e o torneio iniciará.', 'Gerar torneio?')) return;
  const resp = await apiFetch(`/api/torneios/${id}/gerar`, { method:'POST' });
  if (resp?.ok) carregar();
  else { const d = await resp?.json(); sAlert(d?.erro || 'Erro ao gerar.', 'Erro', 'error'); }
}

async function gerarMataMata() {
  if (!await sConfirm('Os classificados de cada grupo serão chaveados no mata-mata.', 'Gerar mata-mata?')) return;
  const resp = await apiFetch(`/api/torneios/${id}/gerar-mata-mata`, { method:'POST' });
  if (resp?.ok) carregar();
  else { const d = await resp?.json(); sAlert(d?.erro || 'Erro ao gerar mata-mata.', 'Erro', 'error'); }
}

// Modal resultado
function abrirRes(partidaId, nomeT1, nomeT2) {
  document.getElementById('resPartidaId').value = partidaId;
  document.getElementById('labelT1').textContent = nomeT1 || 'Time 1';
  document.getElementById('labelT2').textContent = nomeT2 || 'Time 2';
  document.getElementById('resGolsT1').value = 0;
  document.getElementById('resGolsT2').value = 0;
  document.getElementById('resGolsT1V').value = 0;
  document.getElementById('resGolsT2V').value = 0;
  document.getElementById('campoVolta').classList.toggle('oculto', torneioAtual.formato !== 3);
  document.getElementById('erroRes').classList.add('oculto');
  document.getElementById('modalResultado').classList.remove('oculto');
}

function fecharModalRes() { document.getElementById('modalResultado').classList.add('oculto'); }

async function salvarResultado() {
  const pid = document.getElementById('resPartidaId').value;
  const idaVolta = torneioAtual.formato === 3;
  const body = {
    golsTime1: parseInt(document.getElementById('resGolsT1').value),
    golsTime2: parseInt(document.getElementById('resGolsT2').value),
    golsTime1Volta: idaVolta ? parseInt(document.getElementById('resGolsT1V').value) : null,
    golsTime2Volta: idaVolta ? parseInt(document.getElementById('resGolsT2V').value) : null,
  };
  const resp = await apiFetch(`/api/torneios/${id}/partidas/${pid}`, { method:'PUT', body:JSON.stringify(body) });
  if (resp?.ok) { fecharModalRes(); carregar(); }
  else {
    const d = await resp?.json();
    const el = document.getElementById('erroRes');
    el.textContent = d?.erro || 'Erro ao salvar resultado.';
    el.classList.remove('oculto');
  }
}

// Modal add times (checkbox)
async function abrirAddTime() {
  const resp = await apiFetch('/api/times');
  if (!resp?.ok) return;
  const todos = await resp.json();
  const inscritos = new Set(torneioAtual.times.map(tt => tt.timeId));
  const disponiveis = todos.filter(t => !inscritos.has(t.id));
  if (!disponiveis.length) { sAlert('Todos os times já estão inscritos.', 'Aviso', 'info'); return; }

  document.getElementById('listaCheckTimes').innerHTML = disponiveis.map(t => `
    <label style="display:flex;align-items:center;gap:.65rem;padding:.45rem .6rem;border-radius:8px;cursor:pointer;transition:background .12s"
           onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background=''">
      <input type="checkbox" value="${t.id}" class="check-time" onchange="atualizarContador()"
             style="width:16px;height:16px;accent-color:var(--primary-2);cursor:pointer;flex-shrink:0">
      <img src="${t.escudoUrl || '/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'"
           style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border)">
      <span style="font-size:.9rem;color:var(--text-1)">${t.nome}</span>
    </label>`).join('');

  atualizarContador();
  document.getElementById('erroAddTime').classList.add('oculto');
  document.getElementById('modalAddTime').classList.remove('oculto');
}

function atualizarContador() {
  const n = document.querySelectorAll('.check-time:checked').length;
  document.getElementById('contadorSel').textContent = `${n} selecionado${n !== 1 ? 's' : ''}`;
}

function selecionarTodos(marcar) {
  document.querySelectorAll('.check-time').forEach(c => c.checked = marcar);
  atualizarContador();
}

function fecharModalAdd() { document.getElementById('modalAddTime').classList.add('oculto'); }

async function addTimes() {
  const selecionados = [...document.querySelectorAll('.check-time:checked')].map(c => parseInt(c.value));
  if (!selecionados.length) {
    const el = document.getElementById('erroAddTime');
    el.textContent = 'Selecione ao menos um time.';
    el.classList.remove('oculto');
    return;
  }
  document.getElementById('erroAddTime').classList.add('oculto');
  const erros = [];
  for (const timeId of selecionados) {
    const resp = await apiFetch(`/api/torneios/${id}/times`, { method:'POST', body:JSON.stringify({ timeId }) });
    if (!resp?.ok) { const d = await resp?.json(); erros.push(d?.erro || `Erro time ${timeId}`); }
  }
  if (erros.length) {
    const el = document.getElementById('erroAddTime');
    el.textContent = erros.join(' | ');
    el.classList.remove('oculto');
  }
  fecharModalAdd();
  carregar();
}

async function removerTimeInscrito(ttId) {
  if (!await sConfirm('O time será removido do torneio.', 'Remover time?', 'warning')) return;
  const resp = await apiFetch(`/api/torneios/${id}/times/${ttId}`, { method:'DELETE' });
  if (resp?.ok) carregar();
}

carregar();
</script>
