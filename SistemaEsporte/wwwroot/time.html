<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Time — Sistema Esporte</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="app-navbar" id="navbar"></nav>

<main class="container page">
  <div id="conteudo">
    <div class="empty-state"><div class="icon">⏳</div><div class="title">Carregando...</div></div>
  </div>
</main>

<script src="/auth.js"></script>
<script>
renderNavbar(document.getElementById('navbar'));
const id = new URLSearchParams(location.search).get('id');
if (!id) location.href = '/index.html';

const POSICOES = ['Goleiro','Zagueiro','Lateral Direito','Lateral Esquerdo','Meio Campo','Atacante','Reserva','Técnico'];
const POSICAO_ICON = ['🧤','🛡️','➡️','⬅️','⚙️','⚽','🔄','📋'];

async function carregarJogadores() {
  const resp = await apiFetch(`/api/times/${id}/jogadores`);
  if (!resp?.ok) return;
  let lista;
  try { lista = await resp.json(); } catch { return; }
  _jogadoresTime = lista;
  const el = document.getElementById('listaJogadores');
  if (!lista.length) {
    el.innerHTML = '<div class="texto-muted-2">Nenhum jogador cadastrado.</div>';
    return;
  }
  // Agrupa por posição
  const grupos = {};
  lista.forEach(j => {
    const k = j.posicaoId;
    if (!grupos[k]) grupos[k] = [];
    grupos[k].push(j);
  });
  el.innerHTML = Object.entries(grupos).map(([pid, jogadores]) => `
    <div style="margin-bottom:1rem">
      <div class="texto-muted-2" style="font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem">
        ${POSICAO_ICON[pid]} ${POSICOES[pid]}
      </div>
      ${jogadores.map(j => {
        const NIVEL_COR   = ['#dc2626','#f97316','#eab308','#22c55e','#2563eb'];
        const NIVEL_LABEL = ['Muito Ruim','Ruim','Médio','Bom','Muito Bom'];
        const nv = j.nivel ?? 1;
        return `
        <div class="flex items-center gap-1 partida-row hover-lift" style="cursor:pointer;margin-bottom:.35rem"
             onclick="location.href='/jogador.html?id=${j.id}'">
          <div style="flex:1;font-weight:600;font-size:.9rem">${j.nome}</div>
          <span style="font-size:.7rem;padding:.1rem .4rem;border-radius:99px;font-weight:600;flex-shrink:0;
            background:${NIVEL_COR[nv]}22;color:${NIVEL_COR[nv]}">${NIVEL_LABEL[nv]}</span>
          <div class="texto-muted-2" style="font-size:.8rem">${j.vitorias}V ${j.empates}E ${j.derrotas}D</div>
          ${isAdmin() ? `
            <button onclick="event.stopPropagation();editarJogador(${j.id},'${j.nome.replace(/'/g,"\\'")}',${j.posicaoId},${nv})"
              class="btn btn-secundario btn-sm" style="padding:.2rem .5rem">✏️</button>
            <button onclick="event.stopPropagation();removerJogador(${j.id})"
              class="btn btn-perigo btn-sm" style="padding:.2rem .5rem">🗑️</button>` : ''}
        </div>`}).join('')}
    </div>`).join('');
}

let editandoJogadorId = null;
let _jogadoresTime = [];

function abrirModalJogador(jogId, nome, posId, nivelId) {
  editandoJogadorId = jogId ?? null;
  document.getElementById('jogNome').value = nome ?? '';
  document.getElementById('jogPosicao').value = posId ?? 0;
  setNivelJog(nivelId ?? 2);
  document.getElementById('tituloModalJogador').textContent = jogId ? 'Editar Jogador' : 'Novo Jogador';
  document.getElementById('modalJogador').classList.remove('oculto');
}

function editarJogador(id, nome, posId, nivelId) { abrirModalJogador(id, nome, posId, nivelId); }
function fecharModalJogador() { document.getElementById('modalJogador').classList.add('oculto'); }
const NIVEL_COR_JOG = ['#dc2626','#f97316','#eab308','#22c55e','#2563eb'];
function setNivelJog(v) {
  document.querySelectorAll('#toggleNivelJog .toggle-btn').forEach((b, i) => {
    const on = i === v;
    b.classList.toggle('active', on);
    b.style.background   = on ? NIVEL_COR_JOG[i] : NIVEL_COR_JOG[i] + '22';
    b.style.color        = on ? '#fff' : NIVEL_COR_JOG[i];
    b.style.borderColor  = NIVEL_COR_JOG[i] + '66';
  });
}

async function salvarJogador() {
  const nome = document.getElementById('jogNome').value.trim();
  if (!nome) return;
  const nomeLower = nome.toLowerCase();
  const duplicado = _jogadoresTime.find(j => j.nome.toLowerCase() === nomeLower && j.id !== editandoJogadorId);
  if (duplicado) { mostrarAlerta(`Já existe um jogador com o nome "${nome}" neste time.`, 'erro'); return; }
  const posicaoId = parseInt(document.getElementById('jogPosicao').value);
  const nivelId   = [...document.querySelectorAll('#toggleNivelJog .toggle-btn')].findIndex(b => b.classList.contains('active'));
  const body = JSON.stringify({ nome, posicaoId, nivelId: nivelId >= 0 ? nivelId : 2 });
  let resp;
  if (editandoJogadorId) {
    resp = await apiFetch(`/api/jogadores/${editandoJogadorId}`, { method:'PUT', body });
  } else {
    resp = await apiFetch(`/api/times/${id}/jogadores`, { method:'POST', body });
  }
  if (resp?.ok) { fecharModalJogador(); carregarJogadores(); }
  else mostrarAlerta('Erro ao salvar jogador.', 'erro');
}

async function removerJogador(jogId) {
  if (!await sConfirm('O jogador será removido permanentemente.', 'Remover jogador?', 'warning')) return;
  const resp = await apiFetch(`/api/jogadores/${jogId}`, { method:'DELETE' });
  if (resp?.ok) carregarJogadores();
  else mostrarAlerta('Erro ao remover jogador.', 'erro');
}

async function carregar() {
  const resp = await apiFetch(`/api/times/${id}`);
  if (!resp?.ok) {
    document.getElementById('conteudo').innerHTML = '<div class="empty-state"><div class="icon">❌</div><div class="title">Time não encontrado</div></div>';
    return;
  }
  const t = await resp.json();
  const inicialNome = t.nome.charAt(0).toUpperCase();
  document.getElementById('conteudo').innerHTML = `
    <div style="
      background: radial-gradient(800px 300px at 20% -10%, rgba(22,163,74,0.18), transparent 60%),
                  radial-gradient(600px 300px at 100% 100%, rgba(52,211,153,0.12), transparent 60%),
                  linear-gradient(180deg,rgba(255,255,255,0.055) 0%,rgba(255,255,255,0.02) 100%);
      border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:2rem;margin-bottom:1.5rem;
      display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
      <div style="position:relative">
        <img id="escudoImg"
          src="${t.escudoUrl || ''}"
          onerror="this.style.display='none';document.getElementById('escudoLetra').style.display='inline-flex'"
          style="width:88px;height:88px;border-radius:50%;object-fit:cover;border:2px solid var(--border-strong);box-shadow:var(--shadow-glow);${t.escudoUrl ? '' : 'display:none'}">
        <div id="escudoLetra" style="
          width:88px;height:88px;border-radius:50%;
          background:var(--gradient-primary);color:#fff;
          display:${t.escudoUrl ? 'none' : 'inline-flex'};
          align-items:center;justify-content:center;
          font-family:'Sora',sans-serif;font-weight:800;font-size:2.2rem;
          box-shadow:var(--shadow-glow)">${inicialNome}</div>
        ${isAdmin() ? `
          <button onclick="document.getElementById('inputEscudo').click()"
            style="position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;
              background:var(--gradient-primary);border:2px solid var(--bg-1);
              color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem"
            title="Alterar escudo">✏️</button>
          <input type="file" id="inputEscudo" accept="image/*" style="display:none" onchange="uploadEscudo(this)">` : ''}
      </div>
      <div style="flex:1;min-width:200px">
        <h1 style="font-family:'Sora',sans-serif;font-size:2rem;margin:0 0 .4rem" id="nomeExibicao">${t.nome}</h1>
        <div class="flex gap-1" style="flex-wrap:wrap">
          <span class="score-pill">🏅 ${t.pontuacao} pts</span>
          <span style="color:var(--text-3);font-size:.85rem;align-self:center">${t.partidas} partidas disputadas</span>
        </div>
      </div>
      ${isAdmin() ? `
        <div class="flex gap-1" style="flex-wrap:wrap;align-self:flex-start">
          <button onclick="abrirEditarNome()" class="btn btn-secundario btn-sm">✏️ Editar nome</button>
          <button onclick="removerTime()" class="btn btn-perigo btn-sm">🗑️ Remover</button>
        </div>` : ''}
    </div>

    <div id="alertaTime" class="alerta oculto"></div>

    <div id="formEditarNome" class="card-app oculto mb-2" style="max-width:380px">
      <div class="card-body">
        <div class="modal-titulo" style="font-size:.95rem;margin-bottom:.75rem">Editar nome</div>
        <div class="form-group"><input type="text" id="inputNome" class="input" value="${t.nome}"></div>
        <div class="flex gap-1">
          <button onclick="salvarNome()" class="btn btn-primario btn-sm">Salvar</button>
          <button onclick="fecharEditar()" class="btn btn-secundario btn-sm">Cancelar</button>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card cool">
        <div class="stat-icon">✅</div>
        <div><div class="stat-label">Vitórias</div><div class="stat-value">${t.totalVitorias}</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🤝</div>
        <div><div class="stat-label">Empates</div><div class="stat-value">${t.totalEmpates}</div></div>
      </div>
      <div class="stat-card warm">
        <div class="stat-icon">❌</div>
        <div><div class="stat-label">Derrotas</div><div class="stat-value">${t.totalDerrotas}</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚽</div>
        <div><div class="stat-label">Gols marcados</div><div class="stat-value">${t.totalGolsMarcados}</div></div>
      </div>
      <div class="stat-card warm">
        <div class="stat-icon">🥅</div>
        <div><div class="stat-label">Gols sofridos</div><div class="stat-value">${t.totalGolsSofridos}</div></div>
      </div>
      <div class="stat-card cool">
        <div class="stat-icon">📈</div>
        <div><div class="stat-label">Aproveitamento</div><div class="stat-value">${t.aproveitamento}%</div></div>
      </div>
    </div>

    <div class="card-app mb-2">
      <div class="card-body">
        <div class="flex justify-between items-center mb-2" style="flex-wrap:wrap;gap:.5rem">
          <h2 style="font-family:'Sora',sans-serif;font-size:1.1rem;margin:0">👥 Elenco</h2>
          ${isAdmin() ? `<button onclick="abrirModalJogador()" class="btn btn-primario btn-sm">+ Adicionar jogador</button>` : ''}
        </div>
        <div id="listaJogadores"><div class="texto-muted-2">Carregando...</div></div>
      </div>
    </div>`;

  carregarJogadores();
}

function abrirEditarNome() { document.getElementById('formEditarNome').classList.remove('oculto'); }
function fecharEditar()    { document.getElementById('formEditarNome').classList.add('oculto'); }

async function salvarNome() {
  const nome = document.getElementById('inputNome').value.trim();
  if (!nome) return;
  const resp = await apiFetch(`/api/times/${id}`, { method:'PUT', body:JSON.stringify({ nome }) });
  if (resp?.ok) {
    document.getElementById('nomeExibicao').textContent = nome;
    document.getElementById('escudoLetra').textContent  = nome.charAt(0).toUpperCase();
    fecharEditar();
    mostrarAlerta('Nome atualizado com sucesso.', 'ok');
  } else mostrarAlerta('Erro ao atualizar nome.', 'erro');
}

async function uploadEscudo(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('arquivo', file);
  const resp = await fetch(`/api/times/${id}/escudo`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${getToken()}` },
    body: form,
  });
  if (resp.ok) {
    const d = await resp.json();
    const img = document.getElementById('escudoImg');
    img.src = d.escudoUrl + '?t=' + Date.now();
    img.style.display = '';
    document.getElementById('escudoLetra').style.display = 'none';
    mostrarAlerta('Escudo atualizado!', 'ok');
  } else mostrarAlerta('Erro ao enviar escudo.', 'erro');
}

async function removerTime() {
  if (!await sConfirm(`Remover o time "${document.getElementById('nomeExibicao')?.textContent}"? Esta ação não pode ser desfeita.`, 'Remover time?', 'warning')) return;
  const resp = await apiFetch(`/api/times/${id}`, { method:'DELETE' });
  if (resp?.ok) location.href = '/index.html';
  else mostrarAlerta('Erro ao remover time.', 'erro');
}

function mostrarAlerta(msg, tipo) {
  const el = document.getElementById('alertaTime');
  el.className = `alerta alerta-${tipo}`;
  el.textContent = msg;
  el.classList.remove('oculto');
  setTimeout(() => el.classList.add('oculto'), 3500);
}

carregar();
</script>

<!-- Modal jogador -->
<div class="modal-overlay oculto" id="modalJogador">
  <div class="modal" style="max-width:420px">
    <div class="modal-titulo" id="tituloModalJogador">Novo Jogador</div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input type="text" id="jogNome" class="input" placeholder="Nome do jogador">
    </div>
    <div class="form-group">
      <label class="form-label">Posição</label>
      <select id="jogPosicao" class="select">
        <option value="0">🧤 Goleiro</option>
        <option value="1">🛡️ Zagueiro</option>
        <option value="2">➡️ Lateral Direito</option>
        <option value="3">⬅️ Lateral Esquerdo</option>
        <option value="4">⚙️ Meio Campo</option>
        <option value="5">⚽ Atacante</option>
        <option value="6">🔄 Reserva</option>
        <option value="7">📋 Técnico</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Nível</label>
      <div class="toggle-group" id="toggleNivelJog">
        <button class="toggle-btn" onclick="setNivelJog(0)">Muito Ruim</button>
        <button class="toggle-btn" onclick="setNivelJog(1)">Ruim</button>
        <button class="toggle-btn" onclick="setNivelJog(2)">Médio</button>
        <button class="toggle-btn" onclick="setNivelJog(3)">Bom</button>
        <button class="toggle-btn" onclick="setNivelJog(4)">Muito Bom</button>
      </div>
    </div>
    <div class="modal-acoes">
      <button onclick="fecharModalJogador()" class="btn btn-secundario">Cancelar</button>
      <button onclick="salvarJogador()" class="btn btn-primario">Salvar</button>
    </div>
  </div>
</div>
</body>
</html>
