<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Time — Sistema Esporte</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<main class="container pagina">
  <div id="conteudo">
    <p class="texto-muted">Carregando...</p>
  </div>
</main>

<script src="/auth.js"></script>
<script>
renderNavbar(document.getElementById('navbar'));
const id = new URLSearchParams(location.search).get('id');
if (!id) location.href = '/index.html';

async function carregar() {
  const resp = await apiFetch(`/api/times/${id}`);
  if (!resp?.ok) { document.getElementById('conteudo').innerHTML = '<p class="texto-muted">Time não encontrado.</p>'; return; }
  const t = await resp.json();

  const adminAcoes = isAdmin() ? `
    <div class="flex gap-1" style="margin-top:1rem">
      <button onclick="abrirUploadEscudo()" class="btn btn-secundario btn-sm">📷 Alterar escudo</button>
      <button onclick="abrirEditarNome()" class="btn btn-secundario btn-sm">✏️ Editar nome</button>
      <button onclick="removerTime()" class="btn btn-perigo btn-sm">🗑️ Remover</button>
    </div>
    <input type="file" id="inputEscudo" accept="image/*" style="display:none" onchange="uploadEscudo(this)">` : '';

  document.getElementById('conteudo').innerHTML = `
    <div class="flex gap-2 items-center mb-2" style="flex-wrap:wrap">
      <img id="escudoImg" class="escudo escudo-lg" src="${t.escudoUrl || '/img/escudo-default.svg'}" onerror="this.src='/img/escudo-default.svg'">
      <div>
        <h1 class="pagina-titulo" style="margin-bottom:.2rem" id="nomeTime">${t.nome}</h1>
        ${adminAcoes}
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-valor" style="color:var(--verde-claro)">${t.pontuacao}</div><div class="stat-label">Pontos</div></div>
      <div class="stat-card"><div class="stat-valor">${t.partidas}</div><div class="stat-label">Partidas</div></div>
      <div class="stat-card"><div class="stat-valor" style="color:var(--verde-claro)">${t.totalVitorias}</div><div class="stat-label">Vitórias</div></div>
      <div class="stat-card"><div class="stat-valor">${t.totalEmpates}</div><div class="stat-label">Empates</div></div>
      <div class="stat-card"><div class="stat-valor" style="color:var(--perigo)">${t.totalDerrotas}</div><div class="stat-label">Derrotas</div></div>
      <div class="stat-card"><div class="stat-valor">${t.aproveitamento}%</div><div class="stat-label">Aproveitamento</div></div>
      <div class="stat-card"><div class="stat-valor">${t.totalGolsMarcados}</div><div class="stat-label">Gols marcados</div></div>
      <div class="stat-card"><div class="stat-valor">${t.totalGolsSofridos}</div><div class="stat-label">Gols sofridos</div></div>
      <div class="stat-card"><div class="stat-valor">${t.saldoGols >= 0 ? '+' + t.saldoGols : t.saldoGols}</div><div class="stat-label">Saldo de gols</div></div>
    </div>

    <div id="alertaTime" class="alerta oculto"></div>
    <div id="formEditarNome" class="card oculto" style="max-width:360px;margin-bottom:1rem">
      <div class="card-titulo">Editar nome</div>
      <div class="form-group"><input type="text" id="inputNome" class="input" value="${t.nome}"></div>
      <div class="flex gap-1"><button onclick="salvarNome()" class="btn btn-primario btn-sm">Salvar</button><button onclick="fecharEditar()" class="btn btn-secundario btn-sm">Cancelar</button></div>
    </div>`;
}

function abrirUploadEscudo() { document.getElementById('inputEscudo').click(); }

async function uploadEscudo(input) {
  const file = input.files[0]; if (!file) return;
  const form = new FormData(); form.append('arquivo', file);
  const token = getToken();
  const resp = await fetch(`/api/times/${id}/escudo`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form });
  if (resp.ok) {
    const d = await resp.json();
    document.getElementById('escudoImg').src = d.escudoUrl + '?t=' + Date.now();
    mostrarAlerta('Escudo atualizado!', 'ok');
  } else mostrarAlerta('Erro ao enviar escudo.', 'erro');
}

function abrirEditarNome() { document.getElementById('formEditarNome').classList.remove('oculto'); }
function fecharEditar()    { document.getElementById('formEditarNome').classList.add('oculto'); }

async function salvarNome() {
  const nome = document.getElementById('inputNome').value.trim(); if (!nome) return;
  const resp = await apiFetch(`/api/times/${id}`, { method: 'PUT', body: JSON.stringify({ nome }) });
  if (resp?.ok) { document.getElementById('nomeTime').textContent = nome; fecharEditar(); mostrarAlerta('Nome atualizado!', 'ok'); }
  else mostrarAlerta('Erro ao atualizar nome.', 'erro');
}

async function removerTime() {
  if (!confirm('Remover este time? Esta ação não pode ser desfeita.')) return;
  const resp = await apiFetch(`/api/times/${id}`, { method: 'DELETE' });
  if (resp?.ok) location.href = '/index.html';
  else mostrarAlerta('Erro ao remover time.', 'erro');
}

function mostrarAlerta(msg, tipo) {
  const el = document.getElementById('alertaTime');
  el.className = `alerta alerta-${tipo}`;
  el.textContent = msg;
  el.classList.remove('oculto');
  setTimeout(() => el.classList.add('oculto'), 3000);
}

carregar();
</script>
</body>
</html>
